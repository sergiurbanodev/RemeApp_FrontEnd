<div class="relative">
  <button (click)="toggle()"
    class="m-auto text-white hover:text-primary hover:cursor-pointer transition flex items-center">
    <svg lucideCircleUserRound [size]="48" [strokeWidth]="1.5" title="Home"></svg>
  </button>

  <!-- Dropdown -->
  @if (isOpen()) {
  <div
    class="absolute right-0 mt-2 w-max bg-neutral-900 rounded-lg border border-primary/20 shadow-md shadow-primary/40 text-white hover:cursor-pointer">
    <a (click)="close()" routerLink="/profile" (click)="close()"
      class=" w-full flex gap-2 pl-4 pr-10 py-2 hover:bg-secondary rounded-t-lg">
      <svg lucideUserPen [size]="24" [strokeWidth]="1.5" title="My profile"></svg>
      Mi perfil
    </a>

    <hr class="border-neutral-800">

    <a (click)="close()" routerLink="/settings" (click)="close()"
      class="w-full flex gap-2 pl-4 pr-10 py-2 hover:bg-secondary hover:cursor-pointer">
      <svg lucideBolt [size]="24" [strokeWidth]="1.5" title="Configuration"></svg>
      Configuración
    </a>

    <hr class="border-neutral-800">

    <button (click)="logout()"
      class="w-full flex gap-2 text-left pl-4 pr-10 py-2 hover:bg-secondary rounded-b-lg hover:cursor-pointer">
      <svg lucideLogOut [size]="24" [strokeWidth]="1.5" title="Log out"></svg>
      Cerrar sesión
    </button>
  </div>
  }
</div>
